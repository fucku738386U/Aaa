on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */20 * * *'

jobs:
  rdp-1:
    runs-on: windows-latest
    timeout-minutes: 300
    steps:
    - uses: actions/checkout@v4
    - name: Setup
      run: |
        # ---- RDP Enable ----
        choco install ngrok -y
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        # Disable NLA, allow blank password RDP
        Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0
        New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'LimitBlankPasswordUse' -Value 0 -PropertyType DWord -Force -ErrorAction SilentlyContinue

        # ---- User Setup (Administrator, blank password) ----
        $pass = ConvertTo-SecureString "" -AsPlainText -Force
        Enable-LocalUser -Name "Administrator" -ErrorAction SilentlyContinue
        Set-LocalUser -Name "Administrator" -Password $pass -ErrorAction SilentlyContinue
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Administrator" -ErrorAction SilentlyContinue
        Add-LocalGroupMember -Group "Administrators" -Member "Administrator" -ErrorAction SilentlyContinue

        # ---- Auto-Logon ----
        $winlogon = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
        Set-ItemProperty -Path $winlogon -Name AutoAdminLogon -Value "1"
        Set-ItemProperty -Path $winlogon -Name DefaultUserName -Value "Administrator"
        Set-ItemProperty -Path $winlogon -Name DefaultPassword -Value ""
        Set-ItemProperty -Path $winlogon -Name DefaultDomainName -Value "."
        Set-ItemProperty -Path $winlogon -Name ForceAutoLogon -Value "1"

        # ---- Remove Watermarks ----
        # PaintDesktopVersion (build text)
        reg add "HKCU\Control Panel\Desktop" /v PaintDesktopVersion /t REG_DWORD /d 0 /f
        reg add "HKU\.DEFAULT\Control Panel\Desktop" /v PaintDesktopVersion /t REG_DWORD /d 0 /f
        # Test mode off
        try { bcdedit /set TESTSIGNING OFF } catch { }
        # Hide activation/evaluation watermark (kills the popup, may help)
        reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\SoftwareProtectionPlatform" /v "NoAutoActivate" /t REG_DWORD /d 1 /f

        # ---- Download & Force Wallpaper ----
        $img = "C:\wallpaper.jpg"
        Invoke-WebRequest -Uri "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920&q=80" -OutFile $img -ErrorAction SilentlyContinue
        if (Test-Path $img) {
            Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name Wallpaper -Value $img -ErrorAction SilentlyContinue
            Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name WallpaperStyle -Value "2" -ErrorAction SilentlyContinue   # Stretch
        }

    - name: Tunnel
      run: |
        Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
        Start-Sleep 15
        $t = Invoke-RestMethod http://localhost:4040/api/tunnels
        $url = $t.tunnels.public_url
        Write-Host "RDP-1: $url"
    - name: KeepAlive
      run: |
        $ErrorActionPreference = 'Continue'
        $end = (Get-Date).AddMinutes(300)
        while ((Get-Date) -lt $end) {
          try { $w = New-Object -ComObject wscript.shell; $w.SendKeys("{SCROLLLOCK}") } catch { }
          Start-Sleep 30
          try { $w.SendKeys("{SCROLLLOCK}") } catch { }
          Start-Sleep 30
          try {
            Add-Type -AssemblyName System.Windows.Forms -ErrorAction Stop
            [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point((Get-Random -Max 100),(Get-Random -Max 100))
          } catch { }
          Start-Sleep 1
          try {
            [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point((Get-Random -Max 500),(Get-Random -Max 500))
          } catch { }
          Start-Sleep 28
        }

