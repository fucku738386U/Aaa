name: Anonymous RDP

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360   # 6 hours maximum

    steps:
    - name: Download ngrok
      run: Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip

    - name: Extract ngrok
      run: Expand-Archive -Path ngrok.zip -DestinationPath ./ngrok

    - name: Auth ngrok
      run: ./ngrok/ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Enable RDP & Firewall
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Destroy password policy
      run: |
        secedit /export /cfg c:\secpol.cfg
        (Get-Content c:\secpol.cfg) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content c:\secpol.cfg
        (Get-Content c:\secpol.cfg) -replace 'MinimumPasswordLength = .+', 'MinimumPasswordLength = 0' | Set-Content c:\secpol.cfg
        (Get-Content c:\secpol.cfg) -replace 'MaximumPasswordAge = .+', 'MaximumPasswordAge = -1' | Set-Content c:\secpol.cfg
        secedit /configure /db c:\windows\security\local.sdb /cfg c:\secpol.cfg /areas SECURITYPOLICY
        Remove-Item c:\secpol.cfg -Force
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse" -Value 0
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "restrictanonymous" -Value 0
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "restrictanonymoussam" -Value 0
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Services\Netlogon\Parameters" -Name "DisablePasswordChange" -Value 1

    - name: Create user "1" with password "1"
      run: |
        $pass = ConvertTo-SecureString "1" -AsPlainText -Force
        Get-LocalUser -Name "1" -ErrorAction SilentlyContinue | Remove-LocalUser -ErrorAction SilentlyContinue
        New-LocalUser -Name "1" -Password $pass -FullName "User1" -Description "RDP Access"
        Add-LocalGroupMember -Group "Administrators" -Member "1"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "1"

    - name: Start ngrok tunnel and keep it alive for 6 hours
      run: |
        # Start ngrok in the background, logging output to a file
        $ngrokLog = "$env:TEMP\ngrok.log"
        $ngrokProcess = Start-Process -FilePath "./ngrok/ngrok.exe" -ArgumentList "tcp 3389" -PassThru -RedirectStandardOutput $ngrokLog -RedirectStandardError "$env:TEMP\ngrok.err"

        # Give ngrok a few seconds to start
        Start-Sleep -Seconds 5

        # Fetch the public URL from the log (ngrok API output)
        $url = (Get-Content $ngrokLog | Select-String -Pattern "tcp://.*\.ngrok\.io" | Select-Object -First 1).Matches.Value
        if ($url) {
          Write-Host "##[group]RDP Access"
          Write-Host "Username: 1"
          Write-Host "Password: 1"
          Write-Host "ngrok URL: $url"
          Write-Host "##[endgroup]"
        } else {
          Write-Host "Could not retrieve ngrok URL. Check logs."
        }

        # Record start time
        $start = Get-Date
        $waitSeconds = 5 * 3600 + 55 * 60  # 5 hours 55 minutes

        # Sleep until it's time to trigger the next run
        Write-Host "Waiting $waitSeconds seconds before triggering the next workflow run..."
        Start-Sleep -Seconds $waitSeconds

        # Trigger the same workflow again via GitHub CLI
        gh auth login --with-token <# $env:GITHUB_TOKEN #>  # `gh` automatically uses GITHUB_TOKEN
        gh workflow run "$env:GITHUB_WORKFLOW" --ref "$env:GITHUB_REF_NAME"

        Write-Host "Triggered new workflow run. This instance will now exit (ngrok stops)."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
