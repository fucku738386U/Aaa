    - name: Next Cycle
      if: always()
      run: |
        $headers = @{Authorization = "token ${{ secrets.GH_PAT }}"; Accept = "application/vnd.github.v3+json"}
        $body = @{ref = "main"} | ConvertTo-Json
        Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/20h-rdp.yml/dispatches" -Method Post -Headers $headers -Body $body
